name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # يمكنك تغييرها لما يناسب مشروعك
          channel: 'stable'

      - name: Call flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug # تم اختيار debug لسهولة التجربة بدون مفاتيح توقيع حالياً

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
